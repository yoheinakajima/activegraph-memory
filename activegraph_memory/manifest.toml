# Keep this in sync with activegraph_memory:pack. ActiveGraph validates the
# declared surface against the runtime Pack object when this file is present.

[pack]
name = "activegraph_memory"
version = "0.1.0"
description = "Semantic and epistemic memory layer for ActiveGraph. Adds claims, episodes, temporal references, retrieval plans, coverage reports, confidence vectors, and evidence-backed answers while composing with core and memory_gateway."
license = "Apache-2.0"

[pack.provenance]
authors = ["Yohei Nakajima"]
authored_by = "human"
generator = ""
source_url = "https://github.com/yoheinakajima/activegraph-memory"
created_at = "2026-07-08T00:00:00Z"

[pack.integrity]
content_hash = "sha256:2346d63a9848a2fdea57bd6bfa088033ea6f029ff34415dba02e5b9be5830a1d"

[dependencies]
activegraph = ">=1.5,<2.0"
python = ">=3.11"
python-deps = ["pydantic>=2.0"]

[dependencies.packs]
core = ">=0.1"

[dependencies.optional-packs]
memory_gateway = ">=0.4"
entity = ">=0.1"

[surface]
object_types = ["memory_claim", "memory_episode", "memory_query", "retrieval_plan", "coverage_report", "evidence_bundle", "memory_answer", "temporal_ref", "quantity_claim", "memory_policy", "memory_evaluation"]
relation_types = ["memory_supports", "memory_contradicts", "memory_supersedes", "memory_has_temporal_ref", "memory_has_quantity", "memory_retrieved_for", "memory_used_as_evidence", "memory_has_coverage", "memory_governed_by_policy"]
behaviors = ["memory_query_planner"]
tools = ["plan_memory_query"]
settings_schema = "ActiveGraphMemorySettings"

[fixtures]
entrypoint = "fixtures/run_fixtures.py"
deterministic = true
