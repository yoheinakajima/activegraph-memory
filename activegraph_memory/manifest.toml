# Keep this in sync with activegraph_memory:pack. ActiveGraph validates the
# declared surface against the runtime Pack object when this file is present.

[pack]
name = "activegraph_memory"
version = "0.2.0"
description = "Typed semantic, temporal, and epistemic memory for ActiveGraph with compiled graph queries, proof-oriented retrieval, optional reasoning profiles, persistent embeddings, and measured evidence packaging."
license = "Apache-2.0"

[pack.provenance]
authors = ["Yohei Nakajima"]
authored_by = "human"
generator = ""
source_url = "https://github.com/yoheinakajima/activegraph-memory"
created_at = "2026-07-08T00:00:00Z"

[pack.integrity]
content_hash = "sha256:5b244d0418a4239d58930bdce5525507f7d9839c8a03ec954f2dcdf7cc864fa2"

[dependencies]
activegraph = ">=1.5,<2.0"
python = ">=3.11"
python-deps = ["pydantic>=2.0"]

[dependencies.packs]
core = ">=0.1"

[dependencies.optional-packs]
memory_gateway = ">=0.4"
entity = ">=0.1"

[surface]
object_types = ["memory_claim", "memory_episode", "memory_query", "retrieval_plan", "coverage_report", "evidence_bundle", "memory_answer", "temporal_ref", "quantity_claim", "memory_policy", "memory_evaluation", "memory_entity", "memory_event", "memory_state", "memory_preference", "memory_list_item", "memory_query_analysis", "memory_retrieval_stage", "memory_proof", "memory_benchmark", "memory_embedding"]
relation_types = ["memory_supports", "memory_contradicts", "memory_supersedes", "memory_has_temporal_ref", "memory_has_quantity", "memory_retrieved_for", "memory_used_as_evidence", "memory_has_coverage", "memory_governed_by_policy", "memory_about", "memory_grounded_in", "memory_version_of", "memory_stage_for", "memory_proves"]
behaviors = ["memory_query_analyzer", "memory_query_planner"]
tools = ["plan_memory_query", "analyze_memory_query", "list_memory_profiles"]
settings_schema = "ActiveGraphMemorySettings"

[fixtures]
entrypoint = "fixtures/run_fixtures.py"
deterministic = true
